name: build

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  orchestrator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java-to-kotlin
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Compile + test orchestrator
        run: ./gradlew :orchestrator:build --no-daemon --stacktrace
