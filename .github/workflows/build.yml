name: build

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  orchestrator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java-to-kotlin
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Compile + test orchestrator
        run: ./gradlew :orchestrator:build --no-daemon --stacktrace

      # Type-check the headless J2K plugin so refactors that break it
      # are caught here, not at the next end-to-end run. Skip the full
      # `:build` task — that downloads ~1GB of IntelliJ Community for the
      # sandbox tests, which is excessive for every push.
      - name: Compile j2k-plugin
        run: ./gradlew :j2k-plugin:compileKotlin --no-daemon --stacktrace
