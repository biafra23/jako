# Plan 2 — thin orchestrator config.
# Paths are resolved relative to this file unless absolute. `~` is expanded.
# YAML uses snake_case; Kotlin maps it to camelCase via @SerialName.

project:
  # Root of the Gradle/Maven project to convert.
  root: ~/tuweni-gemma4-pipe
  # Gradle subproject to operate on. The KMP scaffold and per-file
  # compile gate both use this module name.
  module: bytes

claude:
  # `claude` binary. Empty = look on PATH.
  cli: ""
  default_model: claude-sonnet-4-6
  # Risk-tier -> model. The skill is identical across tiers; only the model
  # backing the refinement step changes.
  models:
    LOW: claude-haiku-4-5-20251001
    MEDIUM: claude-sonnet-4-6
    HIGH: claude-opus-4-7
  # On a single leaf file Read .java + Read .kt + Edit .kt is ~3 turns.
  # Inside an SCC the model also reads sibling files in the cycle to
  # understand cross-file types, which can take 8-12 turns alone. 20
  # gives headroom for that plus a few self-verification reads without
  # tripping `error_max_turns`. M3 (6-file Bytes48 cycle) showed 10 was
  # too tight — half the files in the cycle never reached refinement.
  max_turns: 20
  permission_mode: acceptEdits
  extra_args: []
  pause_on_rate_limit: true
  # Parallel `claude -p` calls inside a single refine pass. The Claude
  # subscription has a per-minute throughput cap; staying ≤ 6 keeps us
  # well under it. Set to 1 for serial / debugging.
  concurrency: 4

j2k:
  # Per-file backend chain step 1. See plan §Phase 2.
  #   passthrough:    copy .java verbatim into the .kt slot; the LLM step does
  #                   the whole conversion. The fallback when no J2K binary
  #                   is wired up. The orchestrator treats this as "J2K not
  #                   available" for chain-routing purposes.
  #   headless_idea:  drive a real headless IntelliJ via the :j2k-plugin
  #                   ApplicationStarter. The orchestrator gets idiomatic
  #                   Kotlin as J2K's output, so the LLM refine step only
  #                   needs to polish. Trade-off: ~20s of IDE startup per
  #                   file (a 26-file cycle = ~9 min of pure startup).
  #                   Worth it when refine quality matters more than wall
  #                   time. Use `external` + `scripts/run-j2k-headless.sh`
  #                   below — that wraps the right `./gradlew :j2k-plugin
  #                   :runIde --args="jakoConvert <in> <out>"` invocation.
  #   external:       `command` is a fully-formed script that takes
  #                   <java_in> <kt_out> and writes the converted Kotlin.
  strategy: passthrough
  command: scripts/passthrough-j2k.sh
  # To opt into real J2K via the bundled IntelliJ plugin:
  # strategy: external
  # command: scripts/run-j2k-headless.sh
  args: []
  timeout_seconds: 1800

skills:
  # Vendored JetBrains kotlin-agent-skills (git submodule). We never edit the
  # files under here; we just point claude -p at them.
  root: vendored-skills/upstream/skills
  java_to_kotlin: kotlin-tooling-java-to-kotlin/SKILL.md
  agp9_migration: kotlin-tooling-agp9-migration/SKILL.md

gradle:
  wrapper: ./gradlew
  # {module} is templated in at run-time from project.module.
  test_command: ":{module}:compileKotlin :{module}:test"
  timeout_seconds: 1800

analysis:
  parser: javaparser     # only javaparser is supported in the Kotlin orchestrator
  separate_tests: true
  # Files importing any of these are risk-bumped.
  reflection_imports:
    - java.lang.reflect
    - sun.misc.Unsafe
  high_threshold: 3
  medium_threshold: 1

verify:
  max_retries: 3

git:
  commit_per_file: true
  author: ""

# Per-file backend chain step 2: local OpenAI-compatible endpoint
# (LM Studio / Ollama / vLLM / llama.cpp server). Used ONLY for LOW-risk
# files when enabled and the reachability probe at phase-2 start passes.
local_model:
  enabled: true
  base_url: http://localhost:1234/v1
  model: google/gemma-4-31b
  # Leave empty for typical local servers; set to env-var name (e.g.
  # "OPENAI_API_KEY") if your server requires a bearer token.
  api_key_env: ""
  temperature: 0.1
  max_tokens: 16384
  timeout_seconds: 1800
  probe_timeout_seconds: 3

# Per-file backend chain steps 4 & 5: when claude -p hits its 5-hour window,
# the orchestrator falls through to DeepSeek (if enabled and credits) or
# parks until the window resets.
fallback:
  enabled: true               # DEEPSEEK_API_KEY env var must be set
  return_to_claude_after_window: true
  backend: deepseek
  deepseek:
    base_url: https://api.deepseek.com
    api_key_env: DEEPSEEK_API_KEY
    model: deepseek-chat
    temperature: 0.1
    max_tokens: 16384
    timeout_seconds: 600

state:
  dir: state
