# Plan 2 — thin orchestrator config.
# Paths are resolved relative to this file unless absolute. `~` is expanded.

project:
  # Root of the Gradle/Maven project to convert.
  root: ~/tuweni-gemma4-pipe
  # Gradle subproject to operate on. The KMP scaffold and per-file
  # compile gate both use this module name.
  module: bytes

claude:
  # `claude` binary. Empty = look on PATH.
  cli: ""
  default_model: claude-sonnet-4-6
  # Risk-tier -> model. The skill is identical across tiers; only the model
  # backing the refinement step changes.
  models:
    LOW: claude-haiku-4-5-20251001
    MEDIUM: claude-sonnet-4-6
    HIGH: claude-opus-4-7
  max_turns: 3
  permission_mode: acceptEdits
  extra_args: []
  pause_on_rate_limit: true

j2k:
  # Mechanical first-pass strategy. The orchestrator never inspects what J2K
  # produces — it just feeds the .kt file forward to the refinement step.
  #   headless_idea: pass --command to `idea.sh` for headless conversion (Option A)
  #                  requires a custom IntelliJ plugin that registers an
  #                  ApplicationStarter; vanilla idea has no built-in J2K command.
  #   vscode_engine: shell out to a Node wrapper around j2k-vscode (Option B)
  #                  j2k-vscode is currently editor-only; needs a fork to expose a CLI.
  #   external:      `command` is a fully-formed script that takes <java_in> <kt_out>
  #                  scripts/passthrough-j2k.sh is a 3-line no-op shim that lets
  #                  the claude-skill refinement step do the whole conversion.
  strategy: external
  command: scripts/passthrough-j2k.sh
  args: []
  timeout_seconds: 1800

skills:
  # Vendored JetBrains kotlin-agent-skills (git submodule). We never edit the
  # files under here; we just point claude -p at them.
  root: vendored-skills/upstream/skills
  java_to_kotlin: kotlin-tooling-java-to-kotlin/SKILL.md
  agp9_migration: kotlin-tooling-agp9-migration/SKILL.md

gradle:
  wrapper: ./gradlew
  # {module} is templated in at run-time from project.module.
  test_command: ":{module}:compileKotlinJvm :{module}:test"
  timeout_seconds: 1800

analysis:
  # javalang = proper AST; regex = no extra dep, less accurate.
  parser: javalang
  separate_tests: true
  # Files importing any of these are risk-bumped.
  reflection_imports:
    - java.lang.reflect
    - sun.misc.Unsafe
  high_threshold: 3
  medium_threshold: 1

verify:
  max_retries: 3

git:
  commit_per_file: true
  author: ""

# When claude -p hits the 5-hour subscription window, fall through to a
# different API for the rest of that window. The orchestrator remembers when
# the window resets and resumes claude automatically.
fallback:
  enabled: false              # flip to true once DEEPSEEK_API_KEY is exported
  return_to_claude_after_window: true
  backend: deepseek
  deepseek:
    base_url: https://api.deepseek.com
    api_key_env: DEEPSEEK_API_KEY
    model: deepseek-chat
    temperature: 0.1
    max_tokens: 16384
    timeout_seconds: 600

state:
  dir: state
