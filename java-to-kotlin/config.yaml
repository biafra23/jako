# Java -> Kotlin conversion pipeline config.
# Paths are resolved relative to this file unless absolute.

project:
  # Root containing the Java source tree to convert.
  # For the tuweni smoke test we point at the bytes module.
  source_root: ~/tuweni-gemma4-pipe/bytes/src/main/java
  test_root:   ~/tuweni-gemma4-pipe/bytes/src/test/java
  output_root: output

llm:
  base_url: http://localhost:1234/v1
  model_name: google/gemma-4-31b
  temperature: 0.1
  # Hard upper bound on completion tokens per request. Set well below
  # LM Studio's loaded context length (64141 here) so input+output fits.
  # Big translations (Bytes.java is ~19K input tokens, ~17K output) need
  # the headroom. 48000 leaves ~16K for prompt, fine for files up to
  # ~1500 LOC of Java.
  max_tokens: 48000
  # Per-request HTTP/LLM timeout. A full translation of a ~1700-LOC file at
  # ~19 sec/LOC observed throughput (Gemma 31B Q4_K_M on M1, no_think) wants
  # ~55 min, so 3600 gives generous headroom.
  timeout_seconds: 3600
  # Transient-error retry (network/HTTP) — distinct from the semantic retry loop.
  transient_retries: 3
  transient_backoff_seconds: 5
  # Best-effort reasoning suppression. Each backend reads one of these at most;
  # sending all of them lets the OpenAI / vLLM / Qwen-style servers each pick
  # up the knob they honour. The prompt itself also instructs the model to
  # skip deliberation — that's the load-bearing layer.
  reasoning_effort: minimal
  enable_thinking: false
  no_think: true

translate:
  # Max number of direct-dependency signature blocks to splice into the prompt.
  max_dependency_signatures: 12
  # Hard truncation on each dep signature blob to keep prompt size bounded.
  max_signature_chars: 4000

verify:
  # per_file = compile each .kt against already-converted deps after translation.
  # per_module = compile the entire output tree once at the end.
  # both = per_file during the run + a final per_module sweep.
  mode: both
  # Bound on semantic retries when kotlinc rejects a file.
  max_retries: 3
  # Extra classpath JARs (absolute paths) used at per_file and per_module
  # compile time. Inline list, merged with any paths from classpath_file.
  extra_classpath: []
  # Optional file holding one absolute JAR path per line. Regenerated by
  # running scripts/resolve-classpath.sh against the source project.
  classpath_file: state/classpath.txt

discover:
  # regex (default) or javalang (more accurate, requires `pip install javalang`).
  parser: regex
  # If true, test files are treated as a separate (later) batch.
  separate_tests: true

state:
  dir: state
